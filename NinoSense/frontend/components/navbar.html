<header class="app-header">
    <div class="header-logo-section">
        <div class="logo-emblem">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                <path d="M2 12h20"></path>
            </svg>
        </div>
        <div class="logo-text">
            <span class="agency-title">NinoSense</span>
            <span class="agency-subtitle">National Climate & Ocean Forecast Agency</span>
        </div>
    </div>

    <div class="header-actions">
        <!-- Accessibility Controls -->
        <button class="header-action-btn" id="contrast-toggle" title="High Contrast Mode">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2v20"></path>
                <path d="M12 22a10 10 0 0 0 10-10V2H12z"></path>
            </svg>
        </button>

        {% if current_user.is_authenticated %}
        <!-- Notification Center -->
        <a href="{{ url_for('alert.alerts_view') }}" class="header-action-btn notification-badge-container" title="Climate Alerts">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            {% if unread_notifications_count > 0 %}
            <span class="badge">{{ unread_notifications_count }}</span>
            {% endif %}
        </a>

        <!-- User Profile Dropdown Summary -->
        <div class="user-profile-badge">
            <img src="{{ current_user.profile_pic or 'https://api.dicebear.com/7.x/adventurer/svg?seed=' + current_user.name }}" alt="Avatar" class="avatar-img">
            <div class="user-details-text">
                <span class="user-name">{{ current_user.name }}</span>
                <span class="user-role">Official Subscriber</span>
            </div>
        </div>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-outline" style="padding: 0.4rem 1rem;">Portal Login</a>
        {% endif %}
    </div>
</header>

<style>
.app-header {
    height: 70px;
    background-color: #0f172a; /* Deep Navy */
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    position: fixed;
    top: 25px; /* Pushed down by gov banner */
    left: 0;
    right: 0;
    z-index: 99;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.header-logo-section {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.logo-emblem {
    color: var(--secondary);
}

.logo-text {
    display: flex;
    flex-direction: column;
}

.agency-title {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    color: white;
}

.agency-subtitle {
    font-size: 0.65rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 1.25rem;
}

.header-action-btn {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-smooth);
    position: relative;
    text-decoration: none;
}

.header-action-btn:hover {
    color: white;
    background-color: rgba(255,255,255,0.05);
}

.notification-badge-container .badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background-color: var(--accent-red);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    border: 2px solid #0f172a;
}

.user-profile-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-left: 1px solid rgba(255,255,255,0.1);
    padding-left: 1.25rem;
}

.avatar-img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--secondary);
    background-color: white;
}

.user-details-text {
    display: flex;
    flex-direction: column;
}

.user-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: #f8fafc;
}

.user-role {
    font-size: 0.65rem;
    color: #94a3b8;
}
</style>
