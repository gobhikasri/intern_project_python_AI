<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Registration - NinoSense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <!-- Emblem/Logo -->
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="hsl(221, 83%, 16%)" stroke-width="2.5" style="margin-bottom:0.75rem;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                <path d="M2 12h20"></path>
            </svg>
            <h1 class="auth-title">Register</h1>
            <p class="auth-desc">Subscribe to NinoSense Climate Bulletins</p>
        </div>

        <!-- Flask Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; font-weight: 500; 
                        {% if category == 'danger' %} background-color: #fef2f2; color: #991b1b; border: 1px solid #fee2e2;
                        {% elif category == 'success' %} background-color: #f0fdf4; color: #166534; border: 1px solid #dcfce7;
                        {% else %} background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Signup Credentials Form -->
        <form action="{{ url_for('auth.signup') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="signup-name">Full Name</label>
                <input type="text" id="signup-name" name="name" class="form-control" placeholder="Dr. Elena Rostova" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-email">Email Address</label>
                <input type="email" id="signup-email" name="email" class="form-control" placeholder="name@agency.gov" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.75rem;">
                Create Account
            </button>
        </form>

        <div class="auth-divider">or</div>

        <!-- Google OAuth Integration -->
        <a href="{{ url_for('auth.google_login') }}" class="btn-google">
            <svg viewBox="0 0 24 24" width="18" height="18" style="margin-right: 0.5rem;">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22-.19-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            Sign up with Google
        </a>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign In</a>
        </div>
    </div>
</body>
</html>
