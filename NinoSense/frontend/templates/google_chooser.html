<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="google-chooser-wrapper">
    <div class="google-chooser-card">
        <div class="google-chooser-header">
            <!-- Google Logo SVG -->
            <svg class="google-logo-svg" viewBox="0 0 24 24" width="75" height="24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22-.19-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            <h1 class="google-chooser-title">Choose an account</h1>
            <p class="google-chooser-subtitle">to continue to <b>NinoSense Government Portal</b></p>
        </div>

        <div class="account-list">
            <!-- Sarah Connor Account -->
            <form action="{{ url_for('auth.google_mock_submit') }}" method="POST">
                <input type="hidden" name="email" value="sarah.connor@noaa.gov">
                <input type="hidden" name="name" value="Dr. Sarah Connor">
                <input type="hidden" name="google_id" value="109876543210987654321">
                <input type="hidden" name="profile_pic" value="https://api.dicebear.com/7.x/adventurer/svg?seed=Sarah">
                <button type="submit" class="account-item">
                    <div class="account-avatar">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Sarah" alt="S" style="width:100%; border-radius:50%;">
                    </div>
                    <div class="account-details">
                        <div class="account-name">Dr. Sarah Connor</div>
                        <div class="account-email">sarah.connor@noaa.gov</div>
                    </div>
                </button>
            </form>

            <!-- John Doe Account -->
            <form action="{{ url_for('auth.google_mock_submit') }}" method="POST">
                <input type="hidden" name="email" value="john.doe@gmail.com">
                <input type="hidden" name="name" value="John Doe">
                <input type="hidden" name="google_id" value="123456789012345678901">
                <input type="hidden" name="profile_pic" value="https://api.dicebear.com/7.x/adventurer/svg?seed=John">
                <button type="submit" class="account-item">
                    <div class="account-avatar">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=John" alt="J" style="width:100%; border-radius:50%;">
                    </div>
                    <div class="account-details">
                        <div class="account-name">John Doe</div>
                        <div class="account-email">john.doe@gmail.com</div>
                    </div>
                </button>
            </form>

            <!-- Custom Mock Account Form Toggle -->
            <button class="account-item" id="use-another-account" type="button">
                <div class="account-avatar" style="background-color: transparent;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#5f6368" stroke-width="2">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
                    </svg>
                </div>
                <div class="account-details">
                    <div class="account-name" style="color: #1a73e8; font-weight: 500;">Use another mock account</div>
                </div>
            </button>
        </div>

        <!-- Custom Account Entry Form -->
        <div id="custom-account-form" style="display: none; margin-top: 1.5rem;">
            <form action="{{ url_for('auth.google_mock_submit') }}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="custom-name">Full Name</label>
                    <input type="text" id="custom-name" name="name" class="form-control" placeholder="e.g. Elena Rostova" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="custom-email">Email Address</label>
                    <input type="email" id="custom-email" name="email" class="form-control" placeholder="e.g. elena@gmail.com" required>
                </div>
                <!-- Simulated Google Info -->
                <input type="hidden" name="google_id" id="custom-google-id" value="">
                <input type="hidden" name="profile_pic" id="custom-profile-pic" value="">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" id="back-to-list">Back</button>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const chooserBtn = document.getElementById('use-another-account');
        const customForm = document.getElementById('custom-account-form');
        const accountList = document.querySelector('.account-list');
        const backBtn = document.getElementById('back-to-list');
        
        chooserBtn.addEventListener('click', () => {
            accountList.style.display = 'none';
            customForm.style.display = 'block';
            
            // Randomize Google credentials for customization
            const randomId = Math.floor(Math.random() * 1000000000000000000).toString();
            document.getElementById('custom-google-id').value = randomId;
        });
        
        backBtn.addEventListener('click', () => {
            customForm.style.display = 'none';
            accountList.style.display = 'block';
        });

        // Set dynamic Dicebear avatar on submit
        const nameInput = document.getElementById('custom-name');
        nameInput.addEventListener('change', (e) => {
            const val = e.target.value;
            document.getElementById('custom-profile-pic').value = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(val)}`;
        });
    </script>
</body>
</html>
