```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Niño Risk Prediction System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .info {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
            color: #555;
        }

        .info ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🌊 El Niño Risk Prediction</h1>

        <form action="/predict" method="POST">

            <input
                type="number"
                name="year"
                placeholder="Enter Year (e.g. 2024)"
                required>

            <input
                type="number"
                name="monthnum"
                placeholder="Enter Month Number (1-12)"
                min="1"
                max="12"
                required>

            <input
                type="number"
                step="0.1"
                name="value"
                placeholder="Enter ONI Value"
                required>

            <button type="submit">
                Predict Risk Level
            </button>

        </form>

        <div class="info">
            <h3>Risk Classification</h3>
            <ul>
                <li><strong>Low:</strong> ONI &lt; 0.5</li>
                <li><strong>Medium:</strong> ONI 0.5 to 1.5</li>
                <li><strong>High:</strong> ONI &gt; 1.5</li>
            </ul>
        </div>

    </div>

</body>
</html>
```
